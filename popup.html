<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PURPLE PLAYER</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="plugin" id="pluginRoot">
    <div class="panel">

      <div class="poweredBy" aria-label="Powered by Onyos">
        <span>POWERED BY</span>
        <img src="Assets/onyos.png" alt="Onyos">
      </div>

      <div class="main">

        <div class="module">
          <div class="screen">
            <div class="stage">
              <video id="video"
                src="Assets/video.mp4"
                playsinline muted preload="metadata">
              </video>
            </div>
          </div>
        </div>

        <div class="controls">
          <div class="logo">
            <img src="Assets/logo.png" alt="Purple Player">
          </div>

          <div class="controlPanel">
            <div class="triple">

              <div class="ctrlCard">
                <div class="ctrl-label">LEAN</div>
                <div class="slider-wrap" id="wrapLean">
                  <input type="range" class="vslider" id="sliderLean" min="0" max="648" value="648" step="1">
                  <div class="slider-tooltip" id="tipLean">100%</div>
                </div>
              </div>

              <div class="ctrlCard">
                <div class="ctrl-label">REVERB</div>
                <div class="knobWrap">
                  <div class="knobTip" id="tipReverb">0.0%</div>
                  <input type="range" id="reverb" min="0" max="1" value="0.0" step="0.001"
                    style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;">
                  <div class="knob" id="reverb_ui" style="--a:-135deg" role="slider"
                    aria-label="Reverb" aria-valuemin="0" aria-valuemax="1" aria-valuenow="0" tabindex="0">
                    <img class="knobImg" src="Assets/knob.png" alt="">
                  </div>
                </div>
              </div>

              <div class="ctrlCard">
                <div class="ctrl-label">FLANGER</div>
                <div class="slider-wrap" id="wrapFlanger">
                  <input type="range" class="vslider" id="sliderFlanger" min="0" max="1000" value="0" step="1">
                  <div class="slider-tooltip" id="tipFlanger">0%</div>
                </div>
              </div>

            </div>
          </div>
        </div>

      </div>

      <!-- Rest deiner Struktur bleibt gleich -->

    </div>
  </div>

  <script src="js/rubberband-processor.js"></script>
  <script src="popup.js"></script>
</body>
</html>
