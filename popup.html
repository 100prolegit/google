<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PURPLE PLAYER</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="plugin" id="pluginRoot">
    <div class="panel">

      <div class="poweredBy" aria-label="Powered by Onyos">
        <span>POWERED BY</span>
        <img src="assets/onyos.png" alt="Onyos">
      </div>

      <div class="screws" aria-hidden="true">
        <div class="screw" style="left:10px; top:10px; --r:18deg;"></div>
        <div class="screw" style="right:10px; top:10px; --r:-12deg;"></div>
        <div class="screw" style="left:10px; bottom:10px; --r:33deg;"></div>
        <div class="screw" style="right:10px; bottom:10px; --r:-28deg;"></div>

        <div class="screw" style="left:18%; top:10px; --r:8deg;"></div>
        <div class="screw" style="left:34%; top:10px; --r:-6deg;"></div>
        <div class="screw" style="left:50%; top:10px; --r:14deg;"></div>
        <div class="screw" style="left:66%; top:10px; --r:-10deg;"></div>
        <div class="screw" style="left:82%; top:10px; --r:6deg;"></div>

        <div class="screw" style="left:18%; bottom:10px; --r:-9deg;"></div>
        <div class="screw" style="left:34%; bottom:10px; --r:12deg;"></div>
        <div class="screw" style="left:50%; bottom:10px; --r:-14deg;"></div>
        <div class="screw" style="left:66%; bottom:10px; --r:10deg;"></div>
        <div class="screw" style="left:82%; bottom:10px; --r:-6deg;"></div>

        <div class="screw" style="left:10px; top:22%; --r:-8deg;"></div>
        <div class="screw" style="left:10px; top:38%; --r:16deg;"></div>
        <div class="screw" style="left:10px; top:54%; --r:-18deg;"></div>
        <div class="screw" style="left:10px; top:70%; --r:10deg;"></div>

        <div class="screw" style="right:10px; top:22%; --r:12deg;"></div>
        <div class="screw" style="right:10px; top:38%; --r:-16deg;"></div>
        <div class="screw" style="right:10px; top:54%; --r:18deg;"></div>
        <div class="screw" style="right:10px; top:70%; --r:-10deg;"></div>
      </div>

      <div class="main">

        <div class="module">
          <div class="screen">
            <div class="stage">
              <video id="video"
                src="assets/video.mp4"
                playsinline muted preload="metadata">
              </video>
            </div>
          </div>
        </div>

        <div class="controls">
          <div class="logo">
            <img src="assets/logo.png" alt="Purple Player">
          </div>

          <div class="controlPanel">
            <div class="triple">

              <div class="ctrlCard">
                <div class="ctrl-label">LEAN</div>
                <div class="slider-wrap" id="wrapLean">
                  <input type="range" class="vslider" id="sliderLean" min="0" max="648" value="648" step="1">
                  <div class="slider-tooltip" id="tipLean">100%</div>
                </div>
              </div>

              <div class="ctrlCard">
                <div class="ctrl-label">REVERB</div>
                <div class="knobWrap">
                  <div class="knobTip" id="tipReverb">0.0%</div>
                  <input type="range" id="reverb" min="0" max="1" value="0.0" step="0.001"
                    style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;">
                  <div class="knob" id="reverb_ui" style="--a:-135deg" role="slider"
                    aria-label="Reverb" aria-valuemin="0" aria-valuemax="1" aria-valuenow="0" tabindex="0">
                    <img class="knobImg" src="assets/knob.png" alt="">
                  </div>
                </div>
              </div>

              <div class="ctrlCard">
                <div class="ctrl-label">FLANGER</div>
                <div class="slider-wrap" id="wrapFlanger">
                  <input type="range" class="vslider" id="sliderFlanger" min="0" max="1000" value="0" step="1">
                  <div class="slider-tooltip" id="tipFlanger">0%</div>
                </div>
              </div>

            </div>
          </div>
        </div>

      </div>

      <div class="bottomRow">

        <div class="playerPanel">
          <div class="playerTop">
            <div class="playerTitle">MUSIC PLAYER</div>
            <button class="smallBtn purple" id="btnAdd">+ Add</button>
            <input class="hiddenInput" id="filePick" type="file" accept="audio/*" multiple>
          </div>

          <div class="nowPlaying" id="nowPlaying">
            <div>Keine Tracks geladen</div>
            <span>Füge MP3/WAV/etc. hinzu</span>
          </div>

          <div class="playerControls">
            <button class="iconBtn" id="btnPrev" title="Previous">⟨⟨</button>
            <button class="iconBtn play" id="btnPlay" title="Play/Pause">▶</button>
            <button class="iconBtn" id="btnNext" title="Next">⟩⟩</button>

            <div class="playerVol">
              <label>VOL</label>
              <input id="vol" class="hslider" type="range" min="0" max="1" value="0.85" step="0.001">
            </div>
          </div>

          <div class="playlist">
            <div class="playlistHeader">
              <div>PLAYLIST</div>
              <button class="smallBtn" id="btnClear" title="Clear playlist">Clear</button>
            </div>
            <div class="playlistList" id="playlist"></div>
          </div>
        </div>

        <div class="wavePanel">
          <div class="waveTop">
            <div class="waveTitle">WAVEFORM</div>
            <div class="waveMeta" id="waveMeta">Füge einen Track hinzu…</div>
          </div>
          <canvas id="waveCanvas" aria-label="Waveform"></canvas>
          <div class="waveHint">Tipp: Klicke in die Waveform um im Track zu springen.</div>
        </div>

      </div>

    </div>
  </div>

  <!-- ✅ lokal! -->
  <script src="js/rubberband-processor.js"></script>
  <script src="popup.js"></script>
</body>
</html>
